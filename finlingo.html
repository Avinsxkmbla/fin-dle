<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaChing: Fin-Lingo</title>
    <style>
        :root {
            --bg: #ffffff; --text: #374151; --light: #f3f4f6;
            --primary: #58cc02; --primary-dark: #46a302;
            --secondary: #1cb0f6; --secondary-dark: #1899d6;
            --danger: #ff4b4b; --danger-dark: #ea2b2b;
            --warn: #ffc800; --warn-dark: #e5b400;
            --border: #e5e5e5;
        }

        body {
            background-color: var(--bg); color: var(--text); font-family: 'Nunito', 'Segoe UI', Arial, sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; height: 100vh;
        }

        #app { width: 100%; max-width: 600px; height: 100%; display: flex; flex-direction: column; position: relative; overflow: hidden; }

        /* Tree View */
        #tree-view { flex: 1; overflow-y: auto; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; gap: 40px; }
        
        .tree-node {
            width: 80px; height: 80px; border-radius: 50%; background: var(--primary);
            border: none; border-bottom: 6px solid var(--primary-dark); cursor: pointer; position: relative;
            display: flex; align-items: center; justify-content: center; font-size: 32px; color: white; transition: transform 0.1s, border-bottom-width 0.1s;
            will-change: transform; transform: translateZ(0); 
        }
        .tree-node:active { transform: translateY(6px) translateZ(0); border-bottom-width: 0; }
        .tree-node.locked { background: #e5e5e5; border-bottom-color: #cecece; color: #afafaf; cursor: not-allowed; }
        
        .node-label { position: absolute; top: -30px; font-weight: bold; font-size: 14px; color: #afafaf; white-space: nowrap; }
        .tree-node:not(.locked) .node-label { color: var(--primary); }
        
        /* The Connecting SVG Path */
        #path-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; stroke: #e5e5e5; stroke-width: 15; fill: none; stroke-linecap: round; will-change: transform; transform: translateZ(0); }

        /* Header */
        header { display: flex; align-items: center; padding: 20px; gap: 15px; border-bottom: 2px solid var(--border); }
        .btn-close { background: none; border: none; font-size: 24px; color: #afafaf; cursor: pointer; font-weight: bold; }
        .progress-bar { flex: 1; height: 16px; background: #e5e5e5; border-radius: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
        .hearts { color: var(--danger); font-weight: bold; font-size: 18px; display: flex; align-items: center; gap: 5px; }

        /* Lesson View */
        #lesson-view { flex: 1; display: none; flex-direction: column; }
        #question-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        
        .q-title { font-size: 24px; font-weight: bold; margin-bottom: 30px; }

        /* Buttons & Interactions */
        .btn {
            background: white; border: 2px solid var(--border); border-bottom: 4px solid var(--border); border-radius: 12px;
            padding: 15px; font-size: 16px; font-weight: bold; color: var(--text); cursor: pointer; transition: transform 0.1s, border-bottom-width 0.1s; text-align: left;
            will-change: transform; transform: translateZ(0);
        }
        .btn:active { transform: translateY(2px) translateZ(0); border-bottom-width: 2px; }
        .btn.selected { border-color: var(--secondary); background: #e1f5fe; color: var(--secondary-dark); }
        
        /* Matching Game */
        .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .match-pair { opacity: 0.3; pointer-events: none; }

        /* Build Sentence Game */
        .sentence-area { font-size: 20px; line-height: 1.8; margin-bottom: 30px; font-weight: bold;}
        .blank-slot { display: inline-block; min-width: 100px; height: 30px; border-bottom: 3px solid #e5e5e5; text-align: center; color: var(--primary); vertical-align: bottom; margin: 0 5px; cursor: pointer;}
        .word-bank { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .word-pill { background: white; border: 2px solid var(--border); border-radius: 12px; padding: 10px 15px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 0 var(--border); }
        .word-pill:active { box-shadow: none; transform: translateY(2px); }

        /* Multiple Choice */
        .mc-options { display: flex; flex-direction: column; gap: 10px; }

        /* Swipe / True False */
        .swipe-area { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .btn-true { border-color: var(--primary); color: var(--primary); flex: 1; text-align: center; }
        .btn-false { border-color: var(--danger); color: var(--danger); flex: 1; text-align: center; }

        /* Footer & Avatar */
        footer { border-top: 2px solid var(--border); padding: 20px; position: relative; background: white; transition: background 0.3s; }
        .avatar { position: absolute; left: 20px; top: -60px; width: 80px; height: 80px; }
        
        .mascot-svg { width: 100%; height: 100%; transition: 0.3s; }
        .celebrate { animation: bounce 0.5s; }
        .encourage { animation: shake 0.5s; }
        
        @keyframes bounce { 0%, 100% {transform: scale(1);} 50% {transform: scale(1.2) translateY(-10px);} }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }

        #feedback-box { display: none; margin-bottom: 15px; font-weight: bold; font-size: 18px; }
        #feedback-msg { font-size: 14px; font-weight: normal; margin-top: 5px; line-height: 1.4; }

        #btn-check {
            width: 100%; background: #e5e5e5; color: #a5a5a5; border: none; padding: 15px; font-size: 16px; font-weight: bold;
            border-radius: 12px; cursor: not-allowed; text-transform: uppercase;
        }
        #btn-check.ready { background: var(--primary); color: white; cursor: pointer; border-bottom: 4px solid var(--primary-dark); }
        #btn-check.ready:active { border-bottom-width: 0; transform: translateY(4px); }
        
        /* Footer States */
        footer.correct-state { background: #d7ffb8; border-top-color: var(--primary); }
        footer.correct-state #feedback-box { display: block; color: var(--primary-dark); }
        
        footer.wrong-state { background: #ffdfdf; border-top-color: var(--danger); }
        footer.wrong-state #feedback-box { display: block; color: var(--danger-dark); }
        footer.wrong-state #btn-check { background: var(--danger); border-bottom-color: var(--danger-dark); color: white; cursor: pointer;}

    </style>
</head>
<body>

<div id="app">
    
    <!-- TREE VIEW -->
    <div id="tree-view">
        <svg id="path-svg"><path d="M 300 100 Q 150 250 300 400 T 300 700"></path></svg>
        
        <div style="font-size:32px; font-weight:900; color:var(--primary); margin-bottom: 20px; text-align:center;">FIN-LINGO</div>
        <p style="text-align:center; color:#afafaf; font-weight:bold; margin-top:-20px;">Mastery Path</p>

        <!-- Nodes injected via JS -->
    </div>

    <!-- LESSON VIEW -->
    <div id="lesson-view">
        <header>
            <button class="btn-close" onclick="quitLesson()">×</button>
            <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
            <div class="hearts">❤️ <span id="val-hearts">5</span></div>
        </header>

        <div id="question-area">
            <!-- Dynamic Content -->
        </div>

        <footer>
            <div class="avatar" id="avatar">
                <!-- Simple SVG Owl Mascot -->
                <svg class="mascot-svg" id="mascot-img" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="#58cc02"/>
                    <circle cx="35" cy="40" r="10" fill="white"/>
                    <circle cx="65" cy="40" r="10" fill="white"/>
                    <circle cx="35" cy="40" r="4" fill="black"/>
                    <circle cx="65" cy="40" r="4" fill="black"/>
                    <polygon points="50,55 45,65 55,65" fill="#ffc800"/>
                </svg>
            </div>
            
            <div id="feedback-box">
                <div id="feedback-title">Correct!</div>
                <div id="feedback-msg"></div>
            </div>

            <button id="btn-check" onclick="submitAnswer()">CHECK</button>
        </footer>
    </div>

</div>

<script>

    const LEVELS = [
        {
            id: 1, title: "Algorithmic Trading",
            questions: [
                {
                    type: "sentence",
                    prompt: "Complete the definition:",
                    sentence: "High-Frequency Trading (HFT) relies on $1 to execute orders in milliseconds, looking to profit from microscopic $2.",
                    banks: ["Emotions", "Algorithms", "Dividends", "Price Inefficiencies", "Physical Brokers"],
                    answers: ["Algorithms", "Price Inefficiencies"],
                    lesson: "HFT algorithms hunt for temporary mispricings across exchanges, removing humans entirely from the execution loop."
                }
            ]
        },
        {
            id: 2, title: "The Greeks",
            questions: [
                {
                    type: "match",
                    prompt: "Match the Greek to its Financial Force:",
                    pairs: [
                        { left: "Theta", right: "Time Decay" },
                        { left: "Delta", right: "Price Sensitivity" },
                        { left: "Vega", right: "Volatility Impact" }
                    ],
                    lesson: "Understanding the Greeks is essential for pricing options dynamically."
                }
            ]
        },
        {
            id: 3, title: "Behavioral Finance",
            questions: [
                {
                    type: "mc",
                    prompt: "Deduction: Company X just reported record profits, beating all estimates. However, the stock price immediately drops by 8%. What is the most likely culprit?",
                    options: [
                        "The company secretly went bankrupt.",
                        "The market had already 'priced in' perfection, and forward guidance was weak.",
                        "Dividends were paid out early."
                    ],
                    answerIdx: 1,
                    lesson: "Buy the rumor, sell the news. When data meets reality, traders cash out if the future outlook isn't spectacular."
                }
            ]
        },
        {
            id: 4, title: "Margin & Leverage",
            questions: [
                {
                    type: "tf",
                    prompt: "True or False: Using 4x leverage means your profits are multiplied by 4, but your losses are only calculated on your original cash.",
                    answer: false,
                    lesson: "Leverage is a double-edged sword! Losses are multiplied exactly like profits, leading to rapid liquidation."
                }
            ]
        }
    ];

    let unlockedLevel = parseInt(localStorage.getItem('finlingo_level')) || 1;
    let currentLvlObj = null;
    let qIndex = 0;
    let hearts = 5;

    // State for interactive modules
    let userSelection = null; // single choice
    let matchState = { left: null, right: null, matches: [] };
    let sentenceState = []; // populated words

    const qArea = document.getElementById('question-area');
    const fFooter = document.querySelector('footer');
    const btnCheck = document.getElementById('btn-check');
    const fTitle = document.getElementById('feedback-title');
    const fMsg = document.getElementById('feedback-msg');
    const mascot = document.getElementById('mascot-img');

    // Init
    function renderTree() {
        const tv = document.getElementById('tree-view');
        // keep svg and headers
        const toRem = tv.querySelectorAll('.tree-node');
        toRem.forEach(n=>n.remove());

        LEVELS.forEach((l, idx) => {
            let n = document.createElement('button');
            let isLocked = l.id > unlockedLevel;
            n.className = `tree-node ${isLocked ? 'locked' : ''}`;
            
            // Layout zig zag
            let align = idx % 2 === 0 ? 'flex-start' : 'flex-end';
            if(idx===0) align = 'center';
            n.style.alignSelf = align;
            if(idx > 0) n.style.margin = `0 50px`;

            n.innerHTML = `<div class="node-label">${l.title}</div><span>★</span>`;
            if(!isLocked) {
                n.onclick = () => startLesson(l);
            }
            tv.appendChild(n);
        });
    }

    function startLesson(levelObj) {
        currentLvlObj = levelObj;
        qIndex = 0;
        hearts = 5;
        document.getElementById('val-hearts').innerText = hearts;
        document.getElementById('prog-fill').style.width = '0%';
        
        document.getElementById('tree-view').style.display = 'none';
        document.getElementById('lesson-view').style.display = 'flex';
        
        resetFooter();
        renderQuestion();
    }

    function quitLesson() {
        document.getElementById('lesson-view').style.display = 'none';
        document.getElementById('tree-view').style.display = 'flex';
        renderTree();
    }

    function resetFooter() {
        fFooter.className = '';
        btnCheck.className = '';
        btnCheck.innerText = 'CHECK';
        userSelection = null;
        matchState = { left: null, right: null, matches: [] };
        sentenceState = [];
    }

    function renderQuestion() {
        qArea.innerHTML = '';
        resetFooter();
        mascot.className = "mascot-svg";

        let q = currentLvlObj.questions[qIndex];
        document.getElementById('prog-fill').style.width = ((qIndex) / currentLvlObj.questions.length) * 100 + '%';

        let t = document.createElement('div');
        t.className = 'q-title';
        t.innerText = q.prompt;
        qArea.appendChild(t);

        if (q.type === 'mc') {
            let cont = document.createElement('div');
            cont.className = 'mc-options';
            q.options.forEach((opt, idx) => {
                let b = document.createElement('button');
                b.className = 'btn';
                b.innerText = opt;
                b.onclick = () => {
                    document.querySelectorAll('.mc-options .btn').forEach(x=>x.classList.remove('selected'));
                    b.classList.add('selected');
                    userSelection = idx;
                    btnCheck.classList.add('ready');
                };
                cont.appendChild(b);
            });
            qArea.appendChild(cont);
        }
        else if (q.type === 'tf') {
            let cont = document.createElement('div');
            cont.className = 'swipe-area';
            
            let tBtn = document.createElement('button');
            tBtn.className = 'btn btn-true'; tBtn.innerText = 'TRUE';
            tBtn.onclick = () => {
                tBtn.classList.add('selected'); document.querySelector('.btn-false').classList.remove('selected');
                userSelection = true; btnCheck.classList.add('ready'); 
            };
            
            let fBtn = document.createElement('button');
            fBtn.className = 'btn btn-false'; fBtn.innerText = 'FALSE';
            fBtn.onclick = () => {
                fBtn.classList.add('selected'); document.querySelector('.btn-true').classList.remove('selected');
                userSelection = false; btnCheck.classList.add('ready'); 
            };

            cont.appendChild(tBtn); cont.appendChild(fBtn);
            qArea.appendChild(cont);
        }
        else if (q.type === 'sentence') {
            sentenceState = new Array(q.answers.length).fill(null);
            
            // Build visual sentence
            let sArea = document.createElement('div');
            sArea.className = 'sentence-area';
            let parts = q.sentence.split(/\$(\d)/);
            
            parts.forEach(p => {
                if (/^\d$/.test(p)) {
                    // It's a blank
                    let slotIdx = parseInt(p) - 1;
                    let sp = document.createElement('span');
                    sp.className = 'blank-slot';
                    sp.id = 'slot-' + slotIdx;
                    sp.onclick = () => { 
                        if(sentenceState[slotIdx]) {
                            // pop it back to bank
                            document.querySelector(`.word-pill[data-val="${sentenceState[slotIdx]}"]`).style.display = 'block';
                            sentenceState[slotIdx] = null;
                            sp.innerText = '';
                            btnCheck.classList.remove('ready');
                        }
                    };
                    sArea.appendChild(sp);
                } else {
                    let txt = document.createTextNode(p);
                    sArea.appendChild(txt);
                }
            });
            qArea.appendChild(sArea);

            let bank = document.createElement('div');
            bank.className = 'word-bank';
            // shuffle banks visually
            let shuffled = [...q.banks].sort(()=>Math.random()-0.5);
            shuffled.forEach(w => {
                let pill = document.createElement('div');
                pill.className = 'word-pill';
                pill.innerText = w;
                pill.dataset.val = w;
                pill.onclick = () => {
                    let emptyIdx = sentenceState.indexOf(null);
                    if (emptyIdx !== -1) {
                        sentenceState[emptyIdx] = w;
                        document.getElementById('slot-'+emptyIdx).innerText = w;
                        pill.style.display = 'none';
                        if(!sentenceState.includes(null)) btnCheck.classList.add('ready');
                    }
                };
                bank.appendChild(pill);
            });
            qArea.appendChild(bank);
        }
        else if (q.type === 'match') {
            let lefts = q.pairs.map(p=>p.left).sort(()=>Math.random()-0.5);
            let rights = q.pairs.map(p=>p.right).sort(()=>Math.random()-0.5);
            
            let grid = document.createElement('div');
            grid.className = 'match-grid';
            
            let rL = document.createElement('div'); rL.style.display='flex'; rL.style.flexDirection='column'; rL.style.gap='10px';
            let rR = document.createElement('div'); rR.style.display='flex'; rR.style.flexDirection='column'; rR.style.gap='10px';
            
            lefts.forEach(w => {
                let b = document.createElement('button'); b.className = 'btn'; b.innerText = w; b.id = 'm-L-'+w;
                b.onclick = () => { if(matchState.matches.includes(w)) return; selectMatch('left', w, b); };
                rL.appendChild(b);
            });
            rights.forEach(w => {
                let b = document.createElement('button'); b.className = 'btn'; b.innerText = w; b.id = 'm-R-'+w;
                b.onclick = () => { if(matchState.matches.includes(w)) return; selectMatch('right', w, b); };
                rR.appendChild(b);
            });

            grid.appendChild(rL); grid.appendChild(rR);
            qArea.appendChild(grid);
        }
    }

    function selectMatch(side, val, el) {
        document.querySelectorAll(`#question-area .${side === 'left' ? 'match-grid > div:first-child' : 'match-grid > div:last-child'} .btn`).forEach(b => {
            if(!b.classList.contains('match-pair')) b.classList.remove('selected');
        });
        
        el.classList.add('selected');
        if (side === 'left') matchState.left = val;
        else matchState.right = val;

        if (matchState.left && matchState.right) {
            // Check pair
            let q = currentLvlObj.questions[qIndex];
            let isValid = q.pairs.find(p => p.left === matchState.left && p.right === matchState.right);
            
            if (isValid) {
                document.getElementById('m-L-'+matchState.left).classList.add('match-pair');
                document.getElementById('m-R-'+matchState.right).classList.add('match-pair');
                matchState.matches.push(matchState.left, matchState.right);
            } else {
                // Flash red
                document.getElementById('m-L-'+matchState.left).style.borderColor = 'red';
                document.getElementById('m-R-'+matchState.right).style.borderColor = 'red';
                setTimeout(() => {
                    document.getElementById('m-L-'+matchState.left).style.borderColor = '';
                    document.getElementById('m-R-'+matchState.right).style.borderColor = '';
                    document.querySelectorAll('.match-grid .btn').forEach(b => b.classList.remove('selected'));
                }, 500);
            }
            matchState.left = null; matchState.right = null;
            
            // Checking if all matched natively handles button activation
            if (matchState.matches.length === q.pairs.length * 2) {
                btnCheck.classList.add('ready');
            }
        }
    }

    function submitAnswer() {
        if (fFooter.classList.contains('correct-state') || fFooter.classList.contains('wrong-state')) {
            // "CONTINUE" interaction
            nextStage();
            return;
        }

        if (!btnCheck.classList.contains('ready')) return;

        let q = currentLvlObj.questions[qIndex];
        let isCorrect = false;

        if (q.type === 'mc') isCorrect = (userSelection === q.answerIdx);
        if (q.type === 'tf') isCorrect = (userSelection === q.answer);
        if (q.type === 'sentence') {
            isCorrect = JSON.stringify(sentenceState) === JSON.stringify(q.answers);
        }
        if (q.type === 'match') isCorrect = true; // gate is handled in the UI

        if (isCorrect) {
            fFooter.className = 'correct-state';
            fTitle.innerText = "Correct!";
            fMsg.innerText = q.lesson || "Great job!";
            btnCheck.innerText = 'CONTINUE';
            mascot.classList.add('celebrate');
        } else {
            hearts--;
            document.getElementById('val-hearts').innerText = hearts;
            fFooter.className = 'wrong-state';
            fTitle.innerText = "Incorrect";
            fMsg.innerText = "The true answer slipped away. Deducting 1 Heart and reviewing... " + (q.lesson || "");
            btnCheck.innerText = 'GOT IT';
            mascot.classList.add('encourage');
            mascot.querySelector('circle').setAttribute('fill', '#ff4b4b'); // angry owl

            if (hearts <= 0) {
                fMsg.innerText = "Out of Hearts! Lesson Failed.";
                btnCheck.innerText = 'QUIT';
            }
        }
    }

    function nextStage() {
        mascot.querySelector('circle').setAttribute('fill', '#58cc02'); // restore
        
        if (hearts <= 0) { quitLesson(); return; }

        if (fFooter.classList.contains('correct-state')) {
            qIndex++;
            if (qIndex >= currentLvlObj.questions.length) {
                // Passed Level
                if (currentLvlObj.id >= unlockedLevel) {
                    unlockedLevel = currentLvlObj.id + 1;
                    localStorage.setItem('finlingo_level', unlockedLevel);
                }
                quitLesson();
                return;
            }
        }
        renderQuestion();
    }

    window.onload = renderTree;
</script>

</body>
</html>
