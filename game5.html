<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaChing: Option Deck-Builder</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Roboto+Mono&display=swap');
        
        :root {
            --bg: #111827; --panel: #1f2937; --text: #e5e7eb;
            --hp: #ef4444; --energy: #3b82f6; --boss: #f59e0b;
            --card: #374151; --card-hover: #4b5563;
        }

        body {
            background-color: var(--bg); color: var(--text); font-family: 'Roboto Mono', monospace;
            display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px;
        }

        #game-container {
            width: 800px; height: 600px; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><rect width="100%" height="100%" fill="%23111827"/><circle cx="400" cy="200" r="150" fill="%231f2937" opacity="0.5"/></svg>');
            border: 4px solid #4b5563; border-radius: 8px; position: relative; display: flex; flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); overflow: hidden;
        }

        /* Top: Boss Area */
        #boss-area {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border-bottom: 2px solid #374151;
        }

        .boss-sprite {
            width: 100px; height: 100px; background: var(--boss); border-radius: 10%; box-shadow: 0 0 20px var(--boss);
            display: flex; align-items: center; justify-content: center; font-family: 'Cinzel', serif; font-size: 24px; color: #000; transition: transform 0.5s;
        }

        .track-container { width: 80%; height: 2px; background: #4b5563; position: relative; margin-top: 50px; }
        .track-marker { position: absolute; top: -10px; width: 4px; height: 20px; background: #9ca3af; }
        .boss-token { position: absolute; top: -15px; width: 30px; height: 30px; background: var(--boss); border-radius: 50%; border: 2px solid white; transition: left 0.5s; }

        .hp-bar-container { width: 400px; height: 12px; background: #374151; border: 1px solid #9ca3af; margin-bottom: 15px;}
        .hp-fill { height: 100%; background: var(--hp); transition: width 0.3s; }

        /* Middle: Player Stats */
        #player-area {
            height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; background: rgba(0,0,0,0.5);
        }
        .stat-block { font-size: 18px; font-weight: bold; }
        .energy-orb { display: inline-block; width: 24px; height: 24px; background: var(--energy); border-radius: 50%; color: white; text-align: center; line-height: 24px; }

        /* Bottom: Hand of Cards */
        #hand-area {
            flex: 1; display: flex; justify-content: center; align-items: flex-end; padding: 20px; gap: 10px; perspective: 1000px;
        }

        .card {
            width: 140px; height: 200px; background: var(--card); border: 2px solid #6b7280; border-radius: 8px; padding: 10px; cursor: pointer; transition: 0.2s; position: relative; display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-20px); background: var(--card-hover); border-color: var(--energy); z-index: 10;}
        .card.disabled { opacity: 0.5; filter: grayscale(1); pointer-events: none; }
        
        .card-cost { position: absolute; top: -10px; left: -10px; width: 30px; height: 30px; background: var(--energy); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid white; }
        .card-title { font-size: 14px; font-weight: bold; text-align: center; border-bottom: 1px solid #6b7280; padding-bottom: 5px; margin-bottom: 5px; color: #fbbf24;}
        .card-desc { font-size: 10px; line-height: 1.4; flex: 1; color: #d1d5db; }
        .card-greeks { font-size: 9px; color: #ef4444; text-align: center; border-top: 1px dashed #6b7280; padding-top: 5px;}

        /* Controls */
        #end-turn { position: absolute; right: 20px; bottom: 200px; background: #b91c1c; color: white; border: 2px solid #f87171; padding: 15px; font-family: inherit; font-size: 16px; cursor: pointer; border-radius: 5px; }
        #end-turn:hover { background: #dc2626; }
        #end-turn:disabled { opacity: 0.5; pointer-events: none; }

        /* Modals */
        .modal {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50; text-align: center;
        }
        .window { background: var(--panel); border: 2px solid #fbbf24; padding: 30px; border-radius: 8px; max-width: 500px; }
        .btn-menu { background: #111827; color: #fbbf24; border: 1px solid #fbbf24; padding: 10px; margin: 5px; font-family: inherit; font-size: 14px; cursor: pointer; width: 100%; text-align: left;}
        .btn-menu:hover { background: #b45309; color: white; }

        .floating { position: absolute; font-size: 24px; font-weight: bold; pointer-events: none; animation: floatTxt 1.5s forwards; z-index: 40; }
        @keyframes floatTxt { 0%{opacity:1; transform:translateY(0);} 100%{opacity:0; transform:translateY(-50px);} }
        
    </style>
</head>
<body>

    <h1 style="font-size:32px; color:#3b82f6; margin-bottom:5px; font-family:'Cinzel', serif;">Slay The underlying</h1>
    <p style="font-size:14px; color:#9ca3af; margin-top:0;">Time Decay is the true enemy.</p>

    <div id="game-container">
        
        <div id="boss-area">
            <div style="font-size:18px; margin-bottom:5px;" id="boss-name">The Underlying Stock</div>
            <div class="hp-bar-container"><div class="hp-fill" id="boss-hp"></div></div>
            <div class="boss-sprite" id="boss-sprite">SPY</div>

            <!-- Number Line Track -->
            <div class="track-container">
                <div class="track-marker" style="left:0%"></div><span style="position:absolute; left:-5%; top:15px; font-size:10px;">$50</span>
                <div class="track-marker" style="left:50%"></div><span style="position:absolute; left:48%; top:15px; font-size:10px;">$100</span>
                <div class="track-marker" style="left:100%"></div><span style="position:absolute; left:95%; top:15px; font-size:10px;">$150</span>
                
                <div class="boss-token" id="boss-token" style="left:50%"></div>
            </div>
            <div style="margin-top:40px; font-size:14px; color:#fcd34d;" id="boss-intent">Intent: Drain 10 HP next turn.</div>
        </div>

        <div id="player-area">
            <div class="stat-block" style="color:var(--hp)">HP: <span id="player-hp">100</span>/100</div>
            <div class="stat-block" style="color:var(--energy)">ENERGY: <div class="energy-orb" id="player-energy">3</div> / 3</div>
        </div>

        <div id="hand-area">
            <!-- Cards appended here -->
        </div>

        <button id="end-turn" onclick="endTurn()">End Turn</button>

        <div id="menu-modal" class="modal" style="display:flex;">
            <div class="window">
                <h2 style="color:#fbbf24; font-family:'Cinzel', serif;">Choose Encounter</h2>
                <button class="btn-menu" onclick="startLevel(1)">1. The Theta Thief<br><span style="font-size:10px; color:#9ca3af;">Cards lose 10% damage permanently every turn they sit in your hand. Time it perfectly.</span></button>
                <button class="btn-menu" onclick="startLevel(2)">2. The IV Crush<br><span style="font-size:10px; color:#9ca3af;">Boss enters Earnings Hype! Cards cost 3x Energy this turn. Tomorrow is the crush.</span></button>
                <button class="btn-menu" onclick="startLevel(3)">3. The Covered Call Vendor<br><span style="font-size:10px; color:#9ca3af;">Boss drains your Energy. You must play "Sell Call" to gain Energy, but it caps your damage upside.</span></button>
            </div>
        </div>

        <div id="end-modal" class="modal">
            <div class="window">
                <h2 id="end-title" style="font-family:'Cinzel',serif;">Encounter Over</h2>
                <p id="end-desc"></p>
                <button class="btn-menu" style="text-align:center;" onclick="location.reload()">Return to Map</button>
            </div>
        </div>

        <!-- Active Contracts Zone -->
        <div id="active-contracts" style="position:absolute; top:10px; left:10px; width:200px; display:flex; flex-direction:column; gap:5px; z-index:30;">
        </div>

    </div>

<script>
    // System State
    let hp = 100;
    let energy = 3;
    let maxEnergy = 3;
    let bossHp = 200;
    let bossMaxHp = 200;
    let bossPrice = 100; // Track 50 to 150
    let currentLvl = 1;

    let deck = [];
    let hand = [];
    let activeContracts = [];

    let hypeActive = false;
    let hypeTurns = 0;
    let isAnimating = false; // prevents action overlap
    let lastInputTime = 0;
    const THROTTLE_MS = 250;
    
    const uiHP = document.getElementById('player-hp');
    const uiEnergy = document.getElementById('player-energy');
    const uiBossHP = document.getElementById('boss-hp');
    const uiToken = document.getElementById('boss-token');
    const handContainer = document.getElementById('hand-area');
    const contractsContainer = document.getElementById('active-contracts');

    // Cards Library
    const CARDS = {
        'buy_call': { name: 'Long Call (Strike 110)', cost: 1, type: 'trigger', targetPrice: 110, dmg: 50, duration: 3, greeks: 'Theta Decay: -5 dmg/turn', currDmg: 50 },
        'buy_put': { name: 'Long Put (Strike 90)', cost: 1, type: 'trigger', targetPrice: 90, dmg: 50, duration: 3, greeks: 'Theta Decay: -5 dmg/turn', currDmg: 50 },
        'sell_call': { name: 'Write Call', cost: 0, type: 'yield', gainEnergy: 2, cap: 120, duration: 2, greeks: 'Risk: Caps Boss upward damage.', currDmg: 0 }
    };

    function checkThrottle() {
        let now = performance.now();
        if (now - lastInputTime < THROTTLE_MS) return false;
        lastInputTime = now;
        return true;
    }

    function startLevel(lvl) {
        if (!checkThrottle()) return;
        
        currentLvl = lvl;
        document.getElementById('menu-modal').style.display = 'none';
        
        hp = 100; energy = maxEnergy = 3;
        bossHp = bossMaxHp = 200; bossPrice = 100;
        activeContracts = [];
        hypeActive = false; hypeTurns = 0; isAnimating = false;
        
        // Build deck based on challenge
        if(currentLvl === 1 || currentLvl === 2) {
            deck = ['buy_call', 'buy_put', 'buy_call', 'buy_put', 'buy_call'];
        } else if (currentLvl === 3) {
            deck = ['sell_call', 'buy_call', 'sell_call', 'buy_call'];
            energy = 0; // Starts with no energy!
        }
        
        if(currentLvl === 2) {
            hypeActive = true;
            document.getElementById('boss-intent').innerText = "EARNINGS HYPE! Implied Volatility is 300%.";
            document.getElementById('boss-intent').style.color = "#ef4444";
            document.getElementById('boss-sprite').style.boxShadow = "0 0 50px #ef4444";
        }

        drawHand();
        updateUI();
    }

    function drawHand() {
        hand = [];
        for(let i=0; i<3; i++) {
            if(deck.length > 0) {
                let cId = deck[Math.floor(Math.random()*deck.length)];
                let cData = {...CARDS[cId]}; // clone
                hand.push(cData);
            }
        }
    }

    function floatDmg(x, y, text, color) {
        let textLayer = document.createElement('div');
        textLayer.className = 'floating';
        textLayer.style.left = x + 'px';
        textLayer.style.top = y + 'px';
        textLayer.style.color = color;
        textLayer.innerText = text;
        document.getElementById('game-container').appendChild(textLayer);
        setTimeout(()=>textLayer.remove(), 1500);
    }

    function playCard(index) {
        if (isAnimating || !checkThrottle()) return;
        let c = hand[index];
        
        let cost = c.cost;
        if (currentLvl === 2 && hypeActive) cost *= 3; // IV Crush mechanic 3x cost

        if (energy >= cost) {
            energy -= cost;
            
            if (c.type === 'trigger' || c.type === 'yield') {
                activeContracts.push({ ...c, turnsLeft: c.duration });
                floatDmg(300, 300, `${c.name} Activated!`, '#3b82f6');
            }

            if (c.type === 'yield') {
                energy += c.gainEnergy;
                floatDmg(100, 400, `+${c.gainEnergy} Energy!`, '#3b82f6');
            }

            hand.splice(index, 1);
            updateUI();
        }
    }

    function endTurn() {
        if (isAnimating || !checkThrottle()) return;
        isAnimating = true;

        // Player's End Turn resolution
        // Target checks for active contracts
        for (let i = activeContracts.length - 1; i >= 0; i--) {
            let ac = activeContracts[i];
            
            let executed = false;
            // Strike execution checks
            if (ac.targetPrice == 110 && bossPrice >= 110) executed = true;
            if (ac.targetPrice == 90 && bossPrice <= 90) executed = true;

            if (executed && ac.currDmg > 0) {
                // Determine if damage is capped by a yield contract (Covered Call)
                let isCapped = activeContracts.find(a => a.cap);
                if (isCapped && bossPrice > isCapped.cap) {
                    floatDmg(400, 100, `Damage Blocked by Covered Call!`, '#ef4444');
                    bossHp -= 0; // Capped out!
                } else {
                    bossHp -= ac.currDmg;
                    floatDmg(400, 100, `Strike Hit! -${ac.currDmg} HP`, '#fbbf24');
                }
                activeContracts.splice(i, 1);
            } else {
                ac.turnsLeft--;
                if (ac.turnsLeft <= 0) {
                    activeContracts.splice(i, 1);
                    floatDmg(400, 300, "Option Expired OTM", '#6b7280');
                }
            }
        }

        // Theta Decay on unplayed Hand cards
        if (currentLvl === 1) {
            hand.forEach(c => {
                if (c.type === 'trigger') {
                    c.currDmg = Math.max(0, c.currDmg - 5);
                }
            });
        }

        // IV Crush Resolution
        if (currentLvl === 2 && hypeActive) {
            hypeActive = false;
            document.getElementById('boss-intent').innerText = "IV CRUSH! Options are cheap, but damage is halved!";
            document.getElementById('boss-sprite').style.boxShadow = "none";
            
            // Hand completely loses value
            hand.forEach(c => { if(c.type==='trigger') c.currDmg /= 2; });
        }

        updateUI();
        setTimeout(bossTurn, 800);
    }

    function bossTurn() {
        if (bossHp <= 0) { checkWin(); return; }

        // Boss Movement on Line
        let move = (Math.random() < 0.5 ? 1 : -1) * 20; // Move 20 points
        if (currentLvl === 2 && hypeActive) move *= 2; // high volatile

        bossPrice += move;
        bossPrice = Math.max(50, Math.min(150, bossPrice));

        // Boss Attack (Drains player)
        let drain = currentLvl===3 ? 0 : 10;
        if(currentLvl===3) {
            // Drains energy instead of HP!
            energy = Math.max(0, energy - 1);
            floatDmg(100, 400, "-1 ENERGY DRAIN", '#ef4444');
        } else {
            hp -= drain;
            floatDmg(100, 400, `-${drain} HP`, '#ef4444');
        }

        // Reset Player for Next Turn
        if (currentLvl !== 3) energy = maxEnergy;

        drawHand();
        isAnimating = false;
        updateUI();
        checkWin();
    }

    function checkWin() {
        let m = document.getElementById('end-modal');
        let t = document.getElementById('end-title');
        let d = document.getElementById('end-desc');

        if (hp <= 0) {
            t.innerText = "Margin Called (Dead)";
            t.style.color = "var(--hp)";
            if(currentLvl===1) d.innerText = "You held your options too long. Theta decay consumed their intrinsic value, leaving you powerless.";
            if(currentLvl===2) d.innerText = "You bought during the Hype. The IV Crush wiped out your premium value.";
            if(currentLvl===3) d.innerText = "Energy drained. You failed to generate yield using Covered Calls.";
            document.getElementById('end-turn').disabled = true;
            m.style.display = 'flex';
        } else if (bossHp <= 0) {
            t.innerText = "Boss Liquidated!";
            t.style.color = "#4ade80";
            d.innerText = "You leveraged the physics of the Options Market. Time was managed, risk was contained.";
            document.getElementById('end-turn').disabled = true;
            m.style.display = 'flex';
        }
    }

    function updateUI() {
        uiHP.innerText = Math.floor(hp);
        uiEnergy.innerText = Math.floor(energy);
        uiBossHP.style.width = Math.max(0, (bossHp/bossMaxHp)*100) + '%';
        document.getElementById('end-turn').disabled = isAnimating || hp <= 0 || bossHp <= 0;

        // Map 50-150 range to 0%-100% position layout
        let pct = ((bossPrice - 50) / 100) * 100;
        uiToken.style.left = `calc(${pct}% - 15px)`;

        // Hand Rendering
        handContainer.innerHTML = '';
        hand.forEach((c, idx) => {
            let d = document.createElement('div');
            
            let cost = c.cost;
            if (currentLvl === 2 && hypeActive) cost *= 3;
            if (currentLvl === 1) c.greeks = `Theta Decay: ${c.currDmg} Dmg Left`;
            
            let disabled = (energy < cost || isAnimating) ? 'disabled' : '';
            d.className = `card ${disabled}`;
            d.onclick = () => playCard(idx);
            
            d.innerHTML = `
                <div class="card-cost" style="background:${currentLvl===2&&hypeActive?'#ef4444':'#3b82f6'}">${cost}</div>
                <div class="card-title">${c.name}</div>
                <div class="card-desc">If Underlying hits Strike, deal <strong>${c.currDmg}</strong> damage.<br><br>Expires: ${c.duration} turns.</div>
                <div class="card-greeks">${c.greeks}</div>
            `;
            handContainer.appendChild(d);
        });

        // Contracts Rendering
        contractsContainer.innerHTML = '';
        activeContracts.forEach(ac => {
            let el = document.createElement('div');
            el.style.background = '#374151'; el.style.padding = '5px'; el.style.border = '1px solid #fbbf24'; el.style.fontSize = '10px';
            el.innerHTML = `<span style="color:#fbbf24">${ac.name}</span> <br> ${ac.turnsLeft} turns left.`;
            contractsContainer.appendChild(el);
        });
    }

</script>

</body>
</html>
