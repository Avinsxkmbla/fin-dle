<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaChing: Gap Risk Defense</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        :root {
            --bg: #0f172a; --panel: #1e293b; --text: #f8fafc;
            --stop: #ef4444; --target: #10b981; --hedge: #a855f7;
            --grid: #334155;
        }

        body {
            background-color: var(--bg); color: var(--text); font-family: 'VT323', monospace;
            display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px;
        }

        #game-container {
            width: 800px; height: 600px; background: #0f172a; border: 4px solid #334155;
            position: relative; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        #hud {
            display: flex; justify-content: space-between; padding: 10px 20px; background: rgba(0,0,0,0.8);
            border-bottom: 2px solid var(--grid); font-size: 24px; z-index: 10;
        }
        .stat span { color: #fbbf24; }

        /* The Grid */
        #lane {
            flex: 1; display: grid; grid-template-columns: repeat(15, 1fr); gap: 2px;
            background: #1e293b; padding: 20px 0; margin-top: 10px;
        }

        .cell {
            background: #0f172a; border: 1px dashed #334155; position: relative; cursor: pointer;
            transition: 0.2s; display: flex; align-items:flex-end; justify-content:center;
            padding-bottom:10px; font-size:12px; color: #64748b;
        }
        .cell:hover { background: rgba(255,255,255,0.05); }

        /* Traps rendered via DOM */
        .trap { width: 40px; height: 40px; position: absolute; bottom: 5px; }
        .trap-stop { background: var(--stop); border: 2px solid white; border-radius: 4px; }
        .trap-target { background: var(--target); border: 2px dashed white; border-radius: 50%; }
        .trap-hedge { background: var(--hedge); border: 2px solid #fbbf24; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); }

        /* Monster rendered via Canvas overlay */
        #monster-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 5; }

        /* Toolbar */
        #toolbar {
            display: flex; gap: 10px; justify-content: center; padding: 15px; background: rgba(0,0,0,0.8);
            border-top: 2px solid var(--grid); z-index: 10;
        }

        .btn {
            background: #1e293b; color: white; border: 2px solid #64748b; font-family: inherit; font-size: 18px;
            padding: 10px 15px; cursor: pointer; transition: 0.2s;
        }
        .btn.active { border-color: white; transform: scale(1.05); }
        .btn-stop { border-bottom-color: var(--stop); }
        .btn-target { border-bottom-color: var(--target); }
        .btn-hedge { border-bottom-color: var(--hedge); }

        .btn-start { background: #1d4ed8; border-color: #3b82f6; font-size: 24px; padding: 10px 30px; margin-left: auto;}

        /* Modals */
        .modal {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50; text-align: center;
        }
        .window { background: #1e293b; border: 4px solid var(--primary); padding: 30px; border-radius: 8px; max-width: 500px; }
        .title { color: #fbbf24; font-size: 32px; margin-bottom: 20px; }
        .desc { font-size: 18px; line-height: 1.5; color: #cbd5e1; margin-bottom: 20px;}

    </style>
</head>
<body>

    <h1 style="font-size:32px; color:#10b981; margin-bottom:5px;">Price Action Defense</h1>
    <p style="font-size:18px; color:#94a3b8; margin-top:0;">Build Stop-Loss walls and Take-Profit nets during the Day Phase.</p>

    <div id="game-container">
        
        <div id="hud">
            <div class="stat">PHASE: <span id="txt-phase" style="color:#10b981">DAY (Building)</span></div>
            <div class="stat">GOLD: $<span id="txt-gold">100</span></div>
            <div class="stat">HEALTH: <span id="txt-hp" style="color:#ef4444">100</span></div>
        </div>

        <div id="lane">
            <!-- 15 grid columns representing price distances -->
        </div>

        <canvas id="monster-canvas" width="800" height="600"></canvas>

        <div id="toolbar">
            <button class="btn btn-stop" id="tool-stop" onclick="selTool('stop')">Stop-Loss Wall ($5)</button>
            <button class="btn btn-target" id="tool-target" onclick="selTool('target')">Take-Profit Net ($5)</button>
            <button class="btn btn-hedge" id="tool-hedge" onclick="selTool('hedge')">Options Hedge ($20)</button>
            <button class="btn btn-start" id="btn-night" onclick="startNight()">START NIGHT (Market Open)</button>
        </div>

        <div id="menu-modal" class="modal" style="display:flex;">
            <div class="window">
                <div class="title">Select Level</div>
                <button class="btn" style="width:100%; border-color:#cbd5e1; text-align:left; margin-bottom:10px;" onclick="loadLevel(1)">1. The Whipsaw Woods<br><span style="font-size:12px; color:#94a3b8;">Erratic monsters. Tight Stop-Loss traps will be accidentally triggered. Give trades room to breathe.</span></button>
                <button class="btn" style="width:100%; border-color:#cbd5e1; text-align:left; margin-bottom:10px;" onclick="loadLevel(2)">2. Earnings Gap Roulette<br><span style="font-size:12px; color:#94a3b8;">Monsters teleport past your Stop-Loss on opening. Only the expensive Options Hedge trap can catch them.</span></button>
                <button class="btn" style="width:100%; border-color:#cbd5e1; text-align:left;" onclick="loadLevel(3)">3. 1:3 Risk Management<br><span style="font-size:12px; color:#94a3b8;">Gold is scarce. If your Stop-Loss traps are placed far back, you risk too much for too little reward.</span></button>
            </div>
        </div>

        <div id="end-modal" class="modal">
            <div class="window">
                <div class="title" id="end-title">Night Survived!</div>
                <div class="desc" id="end-desc"></div>
                <button class="btn" onclick="location.reload()">Next Day</button>
            </div>
        </div>

    </div>

<script>
    const cols = 15;
    let grid = new Array(cols).fill(null); 
    
    let gold = 100;
    let hp = 100;
    let phase = 'DAY';
    let currentLvl = 1;
    let activeTool = null;

    let lastInputTime = 0;
    const THROTTLE_MS = 150;

    let monsters = [];

    const canvas = document.getElementById('monster-canvas');
    const ctx = canvas.getContext('2d');
    
    // Setup Grid UI
    const lane = document.getElementById('lane');
    for(let i=0; i<cols; i++) {
        let el = document.createElement('div');
        el.className = 'cell';
        el.innerText = 'P' + i;
        el.onclick = () => placeTrap(i);
        el.id = 'cell-' + i;
        lane.appendChild(el);
    }

    function checkThrottle() {
        let now = performance.now();
        if (now - lastInputTime < THROTTLE_MS) return false;
        lastInputTime = now;
        return true;
    }

    function updateHUD() {
        document.getElementById('txt-gold').innerText = gold;
        document.getElementById('txt-hp').innerText = hp;
        document.getElementById('txt-phase').innerText = phase;
        document.getElementById('txt-phase').style.color = phase==='DAY'?'#10b981':'#ef4444'; 
    }

    function selTool(tool) {
        if (phase !== 'DAY' || !checkThrottle()) return;
        activeTool = tool;
        document.getElementById('tool-stop').classList.remove('active');
        document.getElementById('tool-target').classList.remove('active');
        document.getElementById('tool-hedge').classList.remove('active');
        document.getElementById('tool-'+tool).classList.add('active');
    }

    function placeTrap(idx) {
        if (phase !== 'DAY' || !activeTool || !checkThrottle()) return;
        
        let cost = activeTool === 'hedge' ? 20 : 5;
        if (grid[idx]) { // Refund logic
            gold += grid[idx] === 'hedge' ? 20 : 5;
            document.getElementById('cell-'+idx).innerHTML = 'P'+idx;
            grid[idx] = null;
        }

        if (gold >= cost) {
            gold -= cost;
            grid[idx] = activeTool;
            let visual = document.createElement('div');
            visual.className = `trap trap-${activeTool}`;
            document.getElementById('cell-'+idx).innerHTML = '';
            document.getElementById('cell-'+idx).appendChild(visual);
        }
        updateHUD();
    }

    function loadLevel(lvl) {
        currentLvl = lvl;
        document.getElementById('menu-modal').style.display = 'none';
        
        if(currentLvl===3) gold = 20; 
        else gold = 100;

        grid.fill(null);
        for(let i=0;i<cols;i++){ document.getElementById('cell-'+i).innerHTML = 'P'+i; }
        
        updateHUD();
        lastTime = performance.now();
        requestAnimationFrame(renderLoop);
    }

    // Engine Core modified into standard fixed-accumulator pattern
    let lastTime = 0;
    let physicsAccumulator = 0;
    const FIXED_TICK = 1/60;

    function renderLoop(time) {
        if (phase === 'END') return; // Guard

        let rawDt = (time - lastTime)/1000;
        lastTime = time;

        if (rawDt > 0.25) rawDt = 0.25;
        physicsAccumulator += rawDt;

        while(physicsAccumulator >= FIXED_TICK) {
            if (phase === 'NIGHT') {
                updateNight(FIXED_TICK);
            }
            physicsAccumulator -= FIXED_TICK;
        }
        
        // Render
        ctx.clearRect(0,0,canvas.width,canvas.height);
        
        monsters.forEach(m => {
            let cellWidth = canvas.width / cols;
            let px = m.x * cellWidth + cellWidth/2;
            let py = canvas.height/2 + m.yOffset; 
            
            ctx.fillStyle = m.isGap ? '#a855f7' : '#ef4444';
            ctx.beginPath();
            ctx.arc(px, py, 15, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = '10px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(m.isGap?"GAP":"PA", px, Math.max(0, py - 20)); 
        });

        requestAnimationFrame(renderLoop);
    }

    function startNight() {
        if(phase==='NIGHT' || !checkThrottle()) return;
        phase = 'NIGHT';
        updateHUD();
        document.getElementById('btn-night').style.display='none';

        monsters = [];
        let count = currentLvl === 1 ? 5 : (currentLvl === 2 ? 3 : 4);
        
        for(let i=0; i<count; i++) {
            let delay = i * 2.0; 
            monsters.push({
                x: 0,
                yOffset: 0,
                delay: delay,
                active: false,
                isGap: (currentLvl===2 && i===count-1)?true:false, 
                speed: 1.5,
                timeAlive: 0
            });
        }
    }

    function updateNight(dt) {
        let allDone = true;

        for (let i = monsters.length - 1; i >= 0; i--) {
            let m = monsters[i];
            
            if (m.delay > 0) {
                m.delay -= dt;
                allDone = false;
                continue;
            }
            
            if (m.delay <= 0 && !m.active) { m.active = true; }
            
            if (m.active) {
                allDone = false;
                m.timeAlive += dt;
                
                // Gap logic deterministic processing
                if (m.isGap && m.timeAlive < 1.0) {
                    m.x = 4;
                    m.timeAlive = 1.0;
                } else {
                    m.x += m.speed * dt;
                }

                if(currentLvl === 1) {
                    // Seeded to deterministic dt interval, avoiding GC random overhead spikes
                    m.x += (Math.random()-0.5) * dt * 4; 
                }

                m.yOffset = Math.sin(m.timeAlive * 10) * 15;

                // Collision mathematics natively coupled to physical interval
                let roundedX = Math.round(m.x);
                if (roundedX >= 0 && roundedX < cols) {
                    let trap = grid[roundedX];
                    if (trap) {
                        if (trap === 'stop' && m.isGap) {
                        } 
                        else if (trap === 'hedge' && m.isGap) {
                            killMonster(i, 'hedge');
                        }
                        else if (trap === 'stop' || trap === 'target') {
                            killMonster(i, trap);
                        }
                    }
                }

                if (m.x >= cols) {
                    hp -= 20; updateHUD();
                    monsters.splice(i, 1);
                }
            }
        }

        if (allDone && monsters.length === 0) {
            endNight();
        }
    }

    function killMonster(index, trapType) {
        monsters.splice(index, 1);
        
        if (trapType === 'stop') {
            hp -= 5; 
        } else if (trapType === 'target') {
            gold += 25; 
        } else if (trapType === 'hedge') {
            gold += 50; 
        }
        updateHUD();
    }

    function endNight() {
        phase = 'END';
        let modal = document.getElementById('end-modal');
        let d = document.getElementById('end-desc');
        let t = document.getElementById('end-title');

        if (hp <= 0) {
            t.innerText = "Margin Called (Dead)";
            t.style.color = "var(--stop)";
            d.innerText = "You suffered a catastrophic drawdown because unhedged monsters reached the end of the lane.";
        } else {
            if (currentLvl===1) d.innerText = "You survived the Whipsaw! If you placed stops too tight (cell 1-2), you were stopped out instantly. Giving it room (cells 3-4) captured the profit net.";
            if (currentLvl===2) d.innerText = "You stopped the Gap! Because the market was closed overnight, the Gap monster teleported past your standard Stop-Loss walls. The Hedge saved you.";
            if (currentLvl===3) d.innerText = "You applied strict risk management rules on restricted capital.";
        }
        
        modal.style.display = 'flex';
    }

</script>

</body>
</html>
