<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaChing: Margin Survival</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        :root {
            --bg: #0f172a; --panel: #1e293b; --text: #f8fafc;
            --heat: #ef4444; --coolant: #0ea5e9; --warn: #f59e0b;
        }

        body {
            background-color: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace;
            display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px;
            user-select: none;
        }

        #sub-console {
            width: 800px; height: 600px; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><rect width="100%" height="100%" fill="%231e293b"/><line x1="0" y1="50" x2="800" y2="50" stroke="%23334155" stroke-width="2"/><line x1="0" y1="100" x2="800" y2="100" stroke="%23334155" stroke-width="2"/><line x1="0" y1="150" x2="800" y2="150" stroke="%23334155" stroke-width="2"/> <circle cx="400" cy="300" r="280" stroke="%23334155" stroke-width="4" fill="none"/></svg>') var(--panel);
            border: 8px solid #334155; border-radius: 20px; position: relative; display: flex; flex-direction: column;
            box-shadow: 0 10px 50px rgba(0,0,0,0.9), inset 0 0 100px rgba(0,0,0,0.8); overflow: hidden;
            padding: 20px; box-sizing: border-box;
        }

        /* Top Displays */
        #dash-screens {
            display: flex; justify-content: space-between; gap: 20px; margin-bottom: 30px;
        }
        
        .screen {
            flex: 1; background: #020617; border: 4px solid #475569; border-radius: 8px; padding: 15px; text-align: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        .screen h2 { margin: 0; font-size: 14px; color: #94a3b8; text-transform: uppercase; }
        .screen .val { font-size: 36px; color: #4ade80; text-shadow: 0 0 10px #4ade80; }

        /* Middle Guages */
        #gauges {
            display: flex; justify-content: center; gap: 50px; flex: 1; position: relative;
        }

        .gauge-col { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; width: 100px; }
        
        .meter-bg {
            width: 60px; height: 300px; background: #0f172a; border: 4px solid #475569; border-radius: 30px; position: relative; overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        
        .meter-fill {
            position: absolute; bottom: 0; left: 0; right: 0; background: var(--heat); transition: height 0.1s;
        }
        
        #heat-fill { background: linear-gradient(to top, #f59e0b, #ef4444); }
        #coolant-fill { background: var(--coolant); box-shadow: 0 0 20px var(--coolant); }

        .gauge-label { margin-top: 15px; font-size: 18px; font-weight: bold; color: #94a3b8; text-align: center;}

        /* Throttle */
        .throttle-col {
            position: absolute; right: 40px; top: 150px; display: flex; flex-direction: column; align-items: center;
        }
        .throttle-track {
            width: 20px; height: 250px; background: #0f172a; border: 2px solid #475569; position: relative; border-radius: 10px;
        }
        input[type=range][orient=vertical] {
            writing-mode: bt-lr; /* IE */
            -webkit-appearance: slider-vertical; /* WebKit */
            width: 20px; height: 250px; padding: 0; outline: none; margin: 0; cursor: pointer;
        }
        .throttle-val { font-size: 24px; color: var(--warn); margin-top: 10px; text-shadow: 0 0 10px var(--warn); }

        /* Controls */
        #control-panel {
            display: flex; justify-content: center; gap: 40px; margin-top: 20px;
        }

        .btn-big {
            background: #1e293b; color: #f8fafc; border: 4px solid #475569; border-radius: 50%; width: 120px; height: 120px;
            font-family: inherit; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.1s;
            box-shadow: 0 10px 0 #0f172a; outline: none; display: flex; align-items: center; justify-content: center; text-transform: uppercase;
        }
        .btn-big:active { transform: translateY(10px); box-shadow: 0 0 0 #0f172a; }
        
        .btn-coolant { background: #0369a1; border-color: var(--coolant); }
        .btn-coolant:active { box-shadow: 0 0 30px var(--coolant); }
        
        .btn-decouple { background: #b91c1c; border-color: var(--heat); width: 100px; height: 100px; font-size: 14px;}

        /* Hazards overlay */
        #hazard-red {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(239,68,68,0.3);
            pointer-events: none; opacity: 0; transition: 0.2s; mix-blend-mode: color-burn; z-index: 10;
        }

        /* Modals */
        .modal {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50; text-align: center;
        }
        .window { background: #0f172a; border: 4px solid #ef4444; padding: 30px; border-radius: 8px; max-width: 500px; }
        .btn-menu { background: #1e293b; color: #fbbf24; border: 2px solid #fbbf24; padding: 15px; margin: 10px; font-family: inherit; font-size: 14px; cursor: pointer; width: 100%; text-align: left;}
        .btn-menu:hover { background: #fbbf24; color: black; }

        @keyframes explodeShake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .exploding { animation: explodeShake 0.1s infinite; }

    </style>
</head>
<body>

    <h1 style="font-size:32px; color:#f59e0b; margin-bottom:5px;">Leveraged Submersible</h1>
    <p style="font-size:16px; color:#94a3b8; margin-top:0;">Manage Heat (Margin) vs Coolant (Cash) at Depth.</p>

    <div id="sub-console">
        <div id="hazard-red"></div>

        <div id="dash-screens">
            <div class="screen">
                <h2>Diamonds Mined</h2>
                <div class="val" id="val-diam">0</div>
            </div>
            <div class="screen">
                <h2>Time Survived</h2>
                <div class="val" id="val-time" style="color:#fbbf24">0.0s</div>
            </div>
        </div>

        <div id="gauges">
            <div class="gauge-col">
                <div class="meter-bg">
                    <!-- Red line marker for 100% -->
                    <div style="position:absolute; top:5px; left:0; width:100%; height:2px; background:white; z-index:5;"></div>
                    <div class="meter-fill" id="heat-fill" style="height:0%"></div>
                </div>
                <div class="gauge-label">CORE HEAT<br><span style="font-size:12px;color:#ef4444">(Margin Req)</span></div>
            </div>

            <div class="gauge-col">
                <div class="meter-bg">
                    <div class="meter-fill" id="coolant-fill" style="height:100%"></div>
                </div>
                <div class="gauge-label">COOLANT<br><span style="font-size:12px;color:#0ea5e9">(Avail Cash)</span></div>
            </div>
            
            <div class="throttle-col">
                <input type="range" orient="vertical" id="throttle" min="1" max="50" value="1" step="1">
                <div class="throttle-val"><span id="val-lev">1</span>x</div>
                <div style="font-size:10px; color:#94a3b8; margin-top:5px; text-align:center;">LEVERAGE<br>THROTTLE</div>
            </div>
        </div>

        <div id="control-panel">
            <button class="btn-big btn-coolant" id="btn-pump">Pump<br>Coolant</button>
            <button class="btn-big btn-decouple" onclick="decouple()">DECOUPLE<br>(Close)</button>
        </div>

        <!-- Modals -->
        <div id="menu-modal" class="modal" style="display:flex;">
            <div class="window" style="border-color:#fbbf24;">
                <h2 style="color:#fbbf24; font-size:28px;">Dive Coordinates</h2>
                <button class="btn-menu" onclick="startLevel(1)">1. The Overleveraged Rookie<br><span style="font-size:10px; color:#94a3b8;">Throttle jammed at 50x. Survive 30 seconds to decouple.</span></button>
                <button class="btn-menu" onclick="startLevel(2)">2. The Margin Call Squeeze<br><span style="font-size:10px; color:#94a3b8;">Ocean temperature rises. Coolant tanks dry up. You must physically reduce leverage to survive.</span></button>
                <button class="btn-menu" onclick="startLevel(3)">3. The Black Swan<br><span style="font-size:10px; color:#94a3b8;">Warning: Zero visibility. A massive, instantaneous heat spike is lurking. Decouple with 5,000 diamonds.</span></button>
            </div>
        </div>

        <div id="end-modal" class="modal">
            <div class="window" id="end-window">
                <h2 id="end-title" style="font-size:36px;">LIQUIDATED</h2>
                <p id="end-desc" style="font-size:18px; color:#cbd5e1;"></p>
                <button class="btn-menu" style="text-align:center;" onclick="location.reload()">Reboot Console</button>
            </div>
        </div>

    </div>

<script>
    // System Variables
    let heat = 0; // 0 to 100
    let coolant = 100; // 0 to 100
    let leverage = 1; // 1 to 50
    let diamonds = 0;
    
    let timeSurv = 0;
    let currentLvl = 1;

    let active = false;
    let blackSwanFired = false;

    // Fixed Mathematics Optimsation
    let lastTime = 0;
    let physicsAccumulator = 0;
    const FIXED_TICK_RATE = 0.1; // Engine ticked mathematically 10x per sec deterministically

    // Throttle UI spam protection
    let lastInputTime = 0;
    const THROTTLE_MS = 100; // Limit clicks to 10Hz to match physical engine safely
    let animationId;

    const elHeat = document.getElementById('heat-fill');
    const elCool = document.getElementById('coolant-fill');
    const elLev = document.getElementById('val-lev');
    const throt = document.getElementById('throttle');
    const hazard = document.getElementById('hazard-red');

    // Controls
    throt.addEventListener('input', (e) => {
        leverage = parseInt(e.target.value);
        elLev.innerText = leverage;
    });

    document.getElementById('btn-pump').addEventListener('mousedown', () => {
        let now = performance.now();
        if (now - lastInputTime < THROTTLE_MS) return; 
        lastInputTime = now;

        if(!active) return;
        if(coolant >= 10) {
            coolant -= 10;
            heat = Math.max(0, heat - 25);
            updateUI(); // Immediate visual feedback, logic handled synchronously
        }
    });

    function startLevel(lvl) {
        currentLvl = lvl;
        document.getElementById('menu-modal').style.display = 'none';
        
        heat = 0; coolant = 100; diamonds = 0; timeSurv = 0;
        blackSwanFired = false; physicsAccumulator = 0;
        
        if (currentLvl === 1) {
            throt.value = 50; leverage = 50; throt.disabled = true;
            document.getElementById('val-lev').innerText = 50;
        } else {
            throt.value = 1; leverage = 1; throt.disabled = false;
        }

        active = true;
        lastTime = performance.now();
        animationId = requestAnimationFrame(gameLoop); // Migrated deeply off setInterval
    }

    function gameLoop(timestamp) {
        if (!active) return;
        
        let rawDt = (timestamp - lastTime) / 1000;
        lastTime = timestamp;

        if (rawDt > 0.25) rawDt = 0.25;
        physicsAccumulator += rawDt;

        // Tick precisely at locked Hz 
        while (physicsAccumulator >= FIXED_TICK_RATE) {
            engineTick(FIXED_TICK_RATE);
            physicsAccumulator -= FIXED_TICK_RATE;
        }

        updateUI();
        if (active) {
            animationId = requestAnimationFrame(gameLoop);
        }
    }

    function engineTick(dt) {
        if(!active) return;
        
        timeSurv += dt;
        diamonds += (leverage * (0.5 * (dt / 0.1)));

        // Core Heat generation (Mark-to-Market volatility proxy)
        let baseHeatGen = (Math.random() * 0.5) * (dt/0.1); 
        
        let addedHeat = baseHeatGen * (leverage / 5); 
        heat += addedHeat;

        // Challenge Physics
        if (currentLvl === 1) {
            coolant = Math.min(100, coolant + (2.0 * (dt/0.1))); 
        } 
        else if (currentLvl === 2) {
            heat += (timeSurv * (0.05 * (dt/0.1)));
            coolant = Math.max(0, coolant - (0.2 * (dt/0.1))); 
        } 
        else if (currentLvl === 3) {
            coolant = Math.min(100, coolant + (0.5 * (dt/0.1))); 
            if (!blackSwanFired && timeSurv > 10 + Math.random()*10) {
                heat += 80;
                blackSwanFired = true;
                hazardFlash(1.0);
            }
        }

        heat = Math.max(0, heat - (0.1 * (dt/0.1)));

        if (heat > 80) hazard.style.opacity = (Math.sin(timeSurv*10)*0.5 + 0.5); 
        else hazard.style.opacity = 0;

        if (heat >= 100) explode();
    }

    function destroy() { active = false; cancelAnimationFrame(animationId); }

    function explode() {
        destroy();
        document.getElementById('sub-console').classList.add('exploding');
        hazard.style.opacity = 0.9;
        
        setTimeout(() => {
            document.getElementById('sub-console').classList.remove('exploding');
            endScreen(false);
        }, 1000);
    }

    function decouple() {
        if(!active) return;
        
        // Prevent accidental decoupling double-clicks protecting end-states natively
        let now = performance.now();
        if (now - lastInputTime < 500) return; 
        lastInputTime = now;

        if (currentLevel === 1 && timeSurv < 30) {
            alert("Lock jammed! You must survive 30 seconds first."); return;
        }
        if (currentLevel === 3 && diamonds < 5000) {
            alert("Quota unmet! Need 5,000 diamonds to decouple."); return;
        }

        destroy();
        endScreen(true);
    }

    function hazardFlash(dur) {
        hazard.style.opacity = 1;
        setTimeout(()=> hazard.style.opacity=0, dur*1000);
    }

    function updateUI() {
        document.getElementById('val-diam').innerText = Math.floor(diamonds);
        document.getElementById('val-time').innerText = timeSurv.toFixed(1) + 's';
        
        elHeat.style.height = heat + '%';
        elCool.style.height = coolant + '%';
        
        if (heat > 85) elHeat.style.background = 'white';
        else elHeat.style.background = 'linear-gradient(to top, #f59e0b, #ef4444)';
    }

    function endScreen(win) {
        let modal = document.getElementById('end-modal');
        let t = document.getElementById('end-title');
        let d = document.getElementById('end-desc');
        let winColor = "#4ade80", loseColor = "#ef4444";
        
        document.getElementById('end-window').style.borderColor = win ? winColor : loseColor;

        if (win) {
            t.innerText = "Surface Reached"; t.style.color = winColor;
            if(currentLvl===1) d.innerText = "You survived maximum leverage by pumping your entire cash reserve. Highly stressful, not recommended.";
            if(currentLvl===2) d.innerText = "You realized physically reducing your leverage throttle was the only way to mathematically cool down the engine when cash ran out.";
            if(currentLvl===3) d.innerText = "You absorbed the Black Swan. By not running the engine purely on the red line, you kept enough coolant in reserve for an unpredictable shock.";
        } else {
            t.innerText = "LIQUIDATED (EXPLODED)"; t.style.color = loseColor;
            if(currentLvl===1) d.innerText = "At 50x leverage, tiny market ticks compound into massive margin requirements instantaneously. You couldn't pump cash fast enough.";
            if(currentLvl===2) d.innerText = "You held your positions to the grave. When margin calls (heat) rise, you must forcefully deleverage to survive.";
            if(currentLvl===3) d.innerText = "You assumed the market was stable and pushed your leverage to maximum efficiency. The Black Swan shock instantly consumed your zero-padding account.";
        }
        modal.style.display = 'flex';
    }

</script>

</body>
</html>
